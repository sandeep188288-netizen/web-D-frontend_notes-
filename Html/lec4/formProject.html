<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>University Registration Form</h1>
    <p>Please fill out the form given below to register</p>
    <hr>
    <h2>Personal Details</h2>
  <form>

    <label for="firstname">First Name:</label>
    <input type="text" name="name" id="firstname" placeholder="e.g.:Rahul">
    <br><br>

    <label for="surname">Last Name:</label>
    <input type="text" name="surname" id="surname" placeholder="e.g.:Kumar">
    <br><br>

    <label for="dob">Date Of Birth:</label>
    <input type="date" name="name" id="dob">
    <br><br>

    <h3>Gender:</h3><!--or use label i place of h3-->

    <input type="radio" name="gender" id="male" value="male">
    <label for="male">Male</label>
    <br>
    <input type="radio" name="gender" id="female" value="female">
    <label for="female">Female</label>
    <br>
     <input type="radio" name="gender" id="other" value="other">   
    <label for="other">Other</label>

    <h3>Upload Your Photo</h3> <!--or use label i place of h3-->
    <input type="file" name="file">

    <hr>

    <h2>Contact Information</h2>

    <label for="email">E-mail Address:</label>
    <input type="email" name="email" id="email">

    <br><br>

    <label for="phoneNo.">Mobile Number:</label>
    <input type="tel" name="phoneNo" id="phoneNo">

    <br><br>

    <label for="mailingAddress">Mailing Address:</label>
    <br>
    <textarea name="Address" id="Address" rows="10" cols="30"></textarea>

    <hr>
    
    <h2>Academic Information</h2>

    <label for="course">Select Your Course:</label>

   <select name="course" id="course">
    <option value="CSE">CSE</option>
    <option value="EE">EE</option>
    <option value="ME">Me</option>
    <option value="CE">CE</option>
   </select>

   <br><br>

   <label for="extracurricular">Extracurricular Interests:</label>
   <br>

   <input type="checkbox" name="Interests" id="sports" value="sports">
   <label for="sports">Sports</label>
   <br>

   <input type="checkbox" name="Interests" id="music" value="music">
   <label for="music">Music & Arts</label>
   <br>

   <input type="checkbox" name="Interests" id="Technology" value="Technology">
   <label for="Technology">Technology Club</label>  
   <br>

   <input type="checkbox" name="Interests" id="volunteering" value="volunteering">
   <label for="volunteering">Volunteering</label>
   <br><br>

   <hr>

   <h2>Create Your Account</h2>

   <label for="Pass">Create a Password:</label>
   <input type="password" name="password" id="Pass">
   <br><br>

   <label for="securityQ">Security Questions:</label>
   <select name="securityQ" id="securityQ">
    <option value="nickname">What was your childhood best friend's nickname?</option>
    <option value="book">What was the first book you ever loved?</option>
    <option value="fail">What was the first exam you failed?</option>
    <option value="food">What's your least favorite food as a kid? </option>
   </select>

   <br><br>

   <label for="security">Security Answer:</label>
   <input type="text" name="securityA" id="security">
   <br><br>

   <input type="checkbox" name="TandC" id="T&C">
   <label for="T&C">I agree to the Terms and Conditions.</label>

   <hr>

   <button type="submit">Register</button>
   <button type="reset">Clear Form</button>



  </form> 
   

</body>
</html>
